<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Inter, system-ui, sans-serif; background: #0A1628; color: #F8FAFC; padding: 40px; max-width: 560px; margin: 0 auto;">
  <div style="text-align: center; margin-bottom: 32px;">
    <span style="font-family: monospace; color: #00D4FF; font-size: 14px; letter-spacing: 2px;">
      &lt;<span style="font-family: 'Cabinet Grotesk', sans-serif; font-size: 20px; font-weight: 800; color: #F8FAFC;">TANGER CODE</span>/&gt;
    </span>
  </div>

  <h2 style="font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; margin-bottom: 16px;">
    Reset your password
  </h2>

  <p style="color: #94A3B8; line-height: 1.7; margin-bottom: 24px;">
    You requested a password reset for your TANGER CODE admin account.
    Click the button below to set a new password. This link expires in 1 hour.
  </p>

  <a href="{{ protocol }}://{{ domain }}/admin/reset-password/{{ uid }}/{{ token }}/"
     style="display: inline-block; background: #0052CC; color: #FFFFFF; padding: 14px 32px; border-radius: 9999px; text-decoration: none; font-weight: 600; font-size: 16px;">
    Reset password
  </a>

  <p style="color: #64748B; font-size: 14px; margin-top: 32px;">
    If you did not request this, you can safely ignore this email.
  </p>

  <hr style="border: none; border-top: 1px solid #1E3A5F; margin: 32px 0;">

  <p style="color: #64748B; font-size: 12px; text-align: center;">
    &copy; {{ site_name }} — Tanger, Maroc
  </p>
</body>
</html>
